name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/create-draft-pr-for-cidr-set-calculator
          fetch-depth: 0
      - name: Apply one-shot mobile CIDR fixes
        if: hashFiles('tools/apply-mobile-cidr-fixes.py') != ''
        run: python3 tools/apply-mobile-cidr-fixes.py
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check ipv4-utils.js
          node --check cidr-set-utils.js
          node --check app.js
          node --check standalone-builder-core.js
          node --check standalone-builder.js
          node --check sw.js
          node --check tools/check-index-inline-js.js
          node tools/check-index-inline-js.js
      - name: Run tests
        run: node --test
      - name: Commit one-shot result
        if: success() && hashFiles('tools/apply-mobile-cidr-fixes.py') != ''
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git show HEAD^:.github/workflows/test.yml > .github/workflows/test.yml
          rm -f tools/apply-mobile-cidr-fixes.py
          rm -f .github/workflows/apply-mobile-cidr-fixes.yml
          git add -A
          git commit -m "Polish mobile CIDR results and exclusion defaults"
          git push origin HEAD:codex/create-draft-pr-for-cidr-set-calculator
