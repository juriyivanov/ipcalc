name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/create-draft-pr-for-cidr-set-calculator
          fetch-depth: 0
      - name: Apply export spacing polish
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app.css')
          text = path.read_text()
          old = '.export-output { width: 100%; min-height: 4.75rem; height: auto; max-height: none; overflow: hidden; resize: none; field-sizing: content; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }'
          new = '.export-output { width: 100%; min-height: 3.5rem; height: auto; max-height: none; margin-top: 8px; overflow: hidden; resize: none; field-sizing: content; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check ipv4-utils.js
          node --check cidr-set-utils.js
          node --check app.js
          node --check standalone-builder-core.js
          node --check standalone-builder.js
          node --check sw.js
          node --check tools/check-index-inline-js.js
          node tools/check-index-inline-js.js
      - name: Run tests
        run: node --test
      - name: Publish tested CSS change
        if: success()
        run: |
          if git diff --quiet -- app.css; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.css
          git commit -m "Polish export output spacing"
          git push origin HEAD:codex/create-draft-pr-for-cidr-set-calculator
