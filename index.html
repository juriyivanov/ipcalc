<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="IP Calculator" />
  <title>Extended IP Calculator</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon-192.svg" />
  <style>
    :root {
      color-scheme: dark light;
      background: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1f2937;
    }

    .app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #333;
    }

    .no-script {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f9fafb;
      font-family: Arial, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <noscript>
    <div class="no-script">
      JavaScript is required to run Extended IP Calculator.
    </div>
  </noscript>
  <iframe class="app-frame" title="Extended IP Calculator" src="./ipcalc2.html"></iframe>
  <script>
    if ('serviceWorker' in navigator && window.isSecureContext && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('Service worker registered:', registration.scope);
          })
          .catch((error) => {
            console.warn('Service worker registration failed:', error);
          });
      });
    } else {
      console.log('Service worker is not available in this context. The app still works as a normal HTML page.');
    }
  </script>
</body>
</html>
